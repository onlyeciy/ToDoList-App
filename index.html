<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" />
    <title>To do List no UI</title>
  </head>
  <body>
    <div class="app">
      <h1 class="app__title">Hello, </h1>

      <div class="task">
        <button class="task__new-btn">New Task +</button>
      </div>

      <div class="task__form">
        <div class="task__inputs">
          <div class="task__text-container">
            <input
              class="task__input--title"
              type="text"
              placeholder="Title"
              maxlength="100"
            />
            <input
              class="task__input--desc"
              type="text"
              placeholder="Description"
            />
          </div>

          <div class="task__actions">
            <a href="#" class="task__date-btn">Date</a>

            <div class="task__form-buttons">
              <button class="task__cancel-btn">CANCEL</button>
              <button class="task__add-btn">ADD TASK</button>
            </div>
          </div>
        </div>

        <div class="task__list">
          <ul class="task__items"></ul>
        </div>
      </div>
    </div>
  </body>
</html>
